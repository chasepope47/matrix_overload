<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="reactorGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#aaddff"/>
      <stop offset="50%" stop-color="#44aaff"/>
      <stop offset="100%" stop-color="#000818"/>
    </radialGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001840"/>
      <stop offset="100%" stop-color="#000c24"/>
    </linearGradient>
  </defs>

  <!-- 5 solar panel arms -->
  <!-- Top arm -->
  <rect x="88" y="8" width="24" height="68" rx="3" fill="url(#panelGrad)"
        stroke="#44aaff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Solar panel cells on top arm -->
  <line x1="96" y1="8"  x2="96" y2="76"  stroke="#226688" stroke-width="1"/>
  <line x1="88" y1="24" x2="112" y2="24" stroke="#226688" stroke-width="1"/>
  <line x1="88" y1="40" x2="112" y2="40" stroke="#226688" stroke-width="1"/>
  <line x1="88" y1="56" x2="112" y2="56" stroke="#226688" stroke-width="1"/>

  <!-- Upper-right arm -->
  <rect x="88" y="8" width="24" height="68" rx="3" fill="url(#panelGrad)"
        stroke="#44aaff" stroke-width="1.5" filter="url(#glow)"
        transform="rotate(72,100,100)"/>

  <!-- Lower-right arm -->
  <rect x="88" y="8" width="24" height="68" rx="3" fill="url(#panelGrad)"
        stroke="#44aaff" stroke-width="1.5" filter="url(#glow)"
        transform="rotate(144,100,100)"/>

  <!-- Lower-left arm -->
  <rect x="88" y="8" width="24" height="68" rx="3" fill="url(#panelGrad)"
        stroke="#44aaff" stroke-width="1.5" filter="url(#glow)"
        transform="rotate(216,100,100)"/>

  <!-- Upper-left arm -->
  <rect x="88" y="8" width="24" height="68" rx="3" fill="url(#panelGrad)"
        stroke="#44aaff" stroke-width="1.5" filter="url(#glow)"
        transform="rotate(288,100,100)"/>

  <!-- Satellite dish heads on arm tips -->
  <ellipse cx="100" cy="14" r="10" ry="6" fill="#001a3a" stroke="#44aaff" stroke-width="1.5"
           filter="url(#glow)"/>
  <!-- Repeat for other tips using rotation -->
  <g transform="rotate(72,100,100)">
    <ellipse cx="100" cy="14" rx="10" ry="6" fill="#001a3a" stroke="#44aaff" stroke-width="1.5"
             filter="url(#glow)"/>
  </g>
  <g transform="rotate(144,100,100)">
    <ellipse cx="100" cy="14" rx="10" ry="6" fill="#001a3a" stroke="#44aaff" stroke-width="1.5"
             filter="url(#glow)"/>
  </g>
  <g transform="rotate(216,100,100)">
    <ellipse cx="100" cy="14" rx="10" ry="6" fill="#001a3a" stroke="#44aaff" stroke-width="1.5"
             filter="url(#glow)"/>
  </g>
  <g transform="rotate(288,100,100)">
    <ellipse cx="100" cy="14" rx="10" ry="6" fill="#001a3a" stroke="#44aaff" stroke-width="1.5"
             filter="url(#glow)"/>
  </g>

  <!-- Central station hub -->
  <polygon points="100,62 138,81 138,119 100,138 62,119 62,81"
           fill="#000c20" stroke="#44aaff" stroke-width="2" filter="url(#glow)"/>
  <!-- Hub panel lines -->
  <line x1="100" y1="62"  x2="100" y2="138" stroke="#224466" stroke-width="1" opacity="0.6"/>
  <line x1="62"  y1="100" x2="138" y2="100" stroke="#224466" stroke-width="1" opacity="0.6"/>
  <!-- Hub bolts -->
  <circle cx="100" cy="66"  r="3" fill="#44aaff"/>
  <circle cx="134" cy="84"  r="3" fill="#44aaff"/>
  <circle cx="134" cy="116" r="3" fill="#44aaff"/>
  <circle cx="100" cy="134" r="3" fill="#44aaff"/>
  <circle cx="66"  cy="116" r="3" fill="#44aaff"/>
  <circle cx="66"  cy="84"  r="3" fill="#44aaff"/>

  <!-- Main reactor -->
  <circle cx="100" cy="100" r="28" fill="#000818" stroke="#44aaff" stroke-width="2.5"
          filter="url(#glow)"/>
  <circle cx="100" cy="100" r="20" fill="url(#reactorGrad)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="10" fill="#44aaff" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="4"  fill="#aaddff" filter="url(#glow)"/>

  <!-- Reactor scan lines -->
  <circle cx="100" cy="100" r="24" fill="none" stroke="#224466" stroke-width="1"
          stroke-dasharray="6 4"/>
</svg>
