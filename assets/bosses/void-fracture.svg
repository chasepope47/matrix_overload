<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="voidCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff99ff"/>
      <stop offset="40%" stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </radialGradient>
  </defs>

  <!-- Outer hex — partially dissolved/fractured -->
  <polygon points="100,14 172,57 172,143 100,186 28,143 28,57"
           fill="#08000f" stroke="#ff00ff" stroke-width="2" filter="url(#glow)" opacity="0.85"/>

  <!-- Fracture shards radiating out (dimensional bleeding) -->
  <polygon points="100,14 110,0 120,30 105,28"   fill="#ff00ff" opacity="0.7" filter="url(#glow)"/>
  <polygon points="172,57 190,44 186,74 168,66"  fill="#ff00ff" opacity="0.7" filter="url(#glow)"/>
  <polygon points="172,143 192,156 170,172 160,148" fill="#ff00ff" opacity="0.7" filter="url(#glow)"/>
  <polygon points="100,186 108,200 92,200 84,174" fill="#ff00ff" opacity="0.7" filter="url(#glow)"/>
  <polygon points="28,143 8,158 12,130 32,138"   fill="#ff00ff" opacity="0.7" filter="url(#glow)"/>
  <polygon points="28,57 8,44 30,28 40,52"        fill="#ff00ff" opacity="0.7" filter="url(#glow)"/>

  <!-- Void cracks across body -->
  <path d="M100,14  L88,50  L110,60 L95,80  L115,100"   stroke="#ff99ff" stroke-width="1.5" fill="none" filter="url(#glow)"/>
  <path d="M172,57  L148,68 L155,88 L130,95 L115,100"   stroke="#ff99ff" stroke-width="1.5" fill="none" filter="url(#glow)"/>
  <path d="M100,186 L108,148 L90,140 L105,120 L85,100"  stroke="#ff99ff" stroke-width="1.5" fill="none" filter="url(#glow)"/>
  <path d="M28,57   L54,70  L46,92  L68,100 L85,100"    stroke="#ff99ff" stroke-width="1.5" fill="none" filter="url(#glow)"/>

  <!-- Glitch rectangles (digital corruption) -->
  <rect x="60"  y="44"  width="20" height="6"  fill="#ff00ff" opacity="0.4"/>
  <rect x="126" y="58"  width="16" height="5"  fill="#ff00ff" opacity="0.4"/>
  <rect x="140" y="120" width="18" height="5"  fill="#ff00ff" opacity="0.3"/>
  <rect x="44"  y="126" width="14" height="5"  fill="#ff00ff" opacity="0.4"/>
  <rect x="72"  y="148" width="22" height="6"  fill="#ff00ff" opacity="0.3"/>

  <!-- Inner hex - the eye of the fracture -->
  <polygon points="100,44 144,68 144,132 100,156 56,132 56,68"
           fill="#140020" stroke="#cc00cc" stroke-width="1.5" opacity="0.9"/>

  <!-- Void center -->
  <circle cx="100" cy="100" r="36" fill="#060009" stroke="#ff00ff" stroke-width="2"
          filter="url(#glow)"/>
  <!-- Reality tear pattern -->
  <path d="M76,76 L100,100 L124,76 M76,124 L100,100 L124,124"
        stroke="#ff00ff" stroke-width="2" fill="none" filter="url(#glow)"/>

  <!-- Core eye -->
  <circle cx="100" cy="100" r="20" fill="url(#voidCore)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="10" fill="#0a0014"/>
  <ellipse cx="100" cy="100" rx="3" ry="8" fill="#ff00ff" filter="url(#glow)"/>
  <!-- Glints -->
  <circle cx="94" cy="94" r="3"  fill="#ffffff" opacity="0.6"/>
  <circle cx="106" cy="106" r="2" fill="#ff99ff" opacity="0.5"/>
</svg>
