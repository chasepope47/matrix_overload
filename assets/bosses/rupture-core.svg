<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9966"/>
      <stop offset="45%" stop-color="#ff4400"/>
      <stop offset="100%" stop-color="#3a0800"/>
    </radialGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5a1800"/>
      <stop offset="100%" stop-color="#1a0400"/>
    </radialGradient>
  </defs>

  <!-- Outer hex armour shell -->
  <polygon points="100,12 174,56 174,144 100,188 26,144 26,56"
           fill="url(#bgGrad)" stroke="#ff4400" stroke-width="3" filter="url(#glow)"/>

  <!-- Inner hex plating -->
  <polygon points="100,28 158,62 158,138 100,172 42,138 42,62"
           fill="none" stroke="#cc3300" stroke-width="2" opacity="0.7"/>

  <!-- Armour panel lines -->
  <line x1="100" y1="12"  x2="100" y2="28"  stroke="#ff6633" stroke-width="2"/>
  <line x1="174" y1="56"  x2="158" y2="62"  stroke="#ff6633" stroke-width="2"/>
  <line x1="174" y1="144" x2="158" y2="138" stroke="#ff6633" stroke-width="2"/>
  <line x1="100" y1="188" x2="100" y2="172" stroke="#ff6633" stroke-width="2"/>
  <line x1="26"  y1="144" x2="42"  y2="138" stroke="#ff6633" stroke-width="2"/>
  <line x1="26"  y1="56"  x2="42"  y2="62"  stroke="#ff6633" stroke-width="2"/>

  <!-- Crack lines radiating from core -->
  <path d="M100,80 L78,48 M100,80 L130,44 M100,120 L72,154 M100,120 L128,158
           M80,100 L40,88 M120,100 L162,90"
        stroke="#ff6633" stroke-width="1.5" fill="none" opacity="0.85" filter="url(#glow)"/>

  <!-- Corner bolts -->
  <circle cx="100" cy="18"  r="5" fill="#550000" stroke="#ff4400" stroke-width="2"/>
  <circle cx="169" cy="60"  r="5" fill="#550000" stroke="#ff4400" stroke-width="2"/>
  <circle cx="169" cy="140" r="5" fill="#550000" stroke="#ff4400" stroke-width="2"/>
  <circle cx="100" cy="182" r="5" fill="#550000" stroke="#ff4400" stroke-width="2"/>
  <circle cx="31"  cy="140" r="5" fill="#550000" stroke="#ff4400" stroke-width="2"/>
  <circle cx="31"  cy="60"  r="5" fill="#550000" stroke="#ff4400" stroke-width="2"/>

  <!-- Mechanical gear ring -->
  <circle cx="100" cy="100" r="56" fill="none" stroke="#882200" stroke-width="6"
          stroke-dasharray="14 7"/>
  <!-- Gear teeth -->
  <circle cx="100" cy="44"  r="5" fill="#cc3300"/>
  <circle cx="144" cy="72"  r="5" fill="#cc3300"/>
  <circle cx="144" cy="128" r="5" fill="#cc3300"/>
  <circle cx="100" cy="156" r="5" fill="#cc3300"/>
  <circle cx="56"  cy="128" r="5" fill="#cc3300"/>
  <circle cx="56"  cy="72"  r="5" fill="#cc3300"/>

  <!-- Rupture energy core -->
  <circle cx="100" cy="100" r="44" fill="url(#coreGrad)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="28" fill="#ff4400" opacity="0.8"/>
  <circle cx="100" cy="100" r="14" fill="#ff9966" filter="url(#glow)"/>

  <!-- Core mechanical cross -->
  <rect x="96" y="64" width="8" height="72" fill="#3a0800" opacity="0.9"/>
  <rect x="64" y="96" width="72" height="8" fill="#3a0800" opacity="0.9"/>
</svg>
