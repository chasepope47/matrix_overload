<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="reactorGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8899"/>
      <stop offset="50%" stop-color="#ff0022"/>
      <stop offset="100%" stop-color="#1a0000"/>
    </radialGradient>
    <linearGradient id="armorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a0808"/>
      <stop offset="100%" stop-color="#1a0000"/>
    </linearGradient>
  </defs>

  <!-- Outer octagon armour hull -->
  <polygon points="100,14 152,28 186,72 186,128 152,172 100,186 48,172 14,128 14,72 48,28"
           fill="url(#armorGrad)" stroke="#ff0022" stroke-width="3" filter="url(#glow)"/>

  <!-- Armour panel plates (8 segments) -->
  <polygon points="100,24 148,36 178,76 100,100" fill="#220000" stroke="#880000" stroke-width="1" opacity="0.7"/>
  <polygon points="100,24 52,36 22,76 100,100"   fill="#2a0000" stroke="#880000" stroke-width="1" opacity="0.7"/>
  <polygon points="178,76 178,124 100,100"        fill="#200000" stroke="#880000" stroke-width="1" opacity="0.7"/>
  <polygon points="22,76  22,124  100,100"        fill="#280000" stroke="#880000" stroke-width="1" opacity="0.7"/>
  <polygon points="100,176 148,164 178,124 100,100" fill="#240000" stroke="#880000" stroke-width="1" opacity="0.7"/>
  <polygon points="100,176 52,164  22,124  100,100" fill="#220000" stroke="#880000" stroke-width="1" opacity="0.7"/>

  <!-- Weapon turrets at 4 cardinal octagon faces -->
  <!-- Top turret -->
  <rect x="84" y="10" width="32" height="20" rx="3" fill="#330000" stroke="#ff0022" stroke-width="1.5"/>
  <rect x="90" y="6"  width="20" height="10" rx="2" fill="#ff0022" filter="url(#glow)"/>
  <!-- Bottom turret -->
  <rect x="84" y="170" width="32" height="20" rx="3" fill="#330000" stroke="#ff0022" stroke-width="1.5"/>
  <rect x="90" y="184" width="20" height="10" rx="2" fill="#ff0022" filter="url(#glow)"/>
  <!-- Left turret -->
  <rect x="10" y="84" width="20" height="32" rx="3" fill="#330000" stroke="#ff0022" stroke-width="1.5"/>
  <rect x="6"  y="90" width="10" height="20" rx="2" fill="#ff0022" filter="url(#glow)"/>
  <!-- Right turret -->
  <rect x="170" y="84" width="20" height="32" rx="3" fill="#330000" stroke="#ff0022" stroke-width="1.5"/>
  <rect x="184" y="90" width="10" height="20" rx="2" fill="#ff0022" filter="url(#glow)"/>

  <!-- Battle damage scars -->
  <path d="M120,32 L108,58 M158,90 L138,102 M150,158 L132,140 M60,165 L72,142"
        stroke="#ff4444" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- Armour bolts on octagon corners -->
  <g fill="#cc0000" stroke="#ff0022" stroke-width="1">
    <circle cx="100" cy="19"  r="4"/>
    <circle cx="148" cy="32"  r="4"/>
    <circle cx="181" cy="74"  r="4"/>
    <circle cx="181" cy="126" r="4"/>
    <circle cx="148" cy="168" r="4"/>
    <circle cx="100" cy="181" r="4"/>
    <circle cx="52"  cy="168" r="4"/>
    <circle cx="19"  cy="126" r="4"/>
    <circle cx="19"  cy="74"  r="4"/>
    <circle cx="52"  cy="32"  r="4"/>
  </g>

  <!-- Central reactor -->
  <circle cx="100" cy="100" r="42" fill="#1a0000" stroke="#ff0022" stroke-width="2.5"
          filter="url(#glow)"/>
  <circle cx="100" cy="100" r="28" fill="url(#reactorGrad)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="14" fill="#ff0022" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="6"  fill="#ff8899" filter="url(#glow)"/>

  <!-- Reactor ring bolts -->
  <circle cx="100" cy="58"  r="4" fill="#ff0022"/>
  <circle cx="142" cy="100" r="4" fill="#ff0022"/>
  <circle cx="100" cy="142" r="4" fill="#ff0022"/>
  <circle cx="58"  cy="100" r="4" fill="#ff0022"/>
</svg>
