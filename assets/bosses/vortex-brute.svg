<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="eyeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#8ce6ff"/>
      <stop offset="100%" stop-color="#00b7ff"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a3a5a"/>
      <stop offset="100%" stop-color="#0b1630"/>
    </radialGradient>
  </defs>

  <!-- Tentacles (8, arranged oct) -->
  <g filter="url(#glow)" opacity="0.9">
    <!-- Top -->
    <path d="M100,88 Q100,55 96,18 Q98,12 100,18 Q104,55 100,88" fill="#00b7ff"/>
    <!-- Top-right -->
    <path d="M109,94 Q130,68 158,46 Q162,42 160,48 Q132,72 109,94" fill="#00b7ff"/>
    <!-- Right -->
    <path d="M114,100 Q148,98 184,96 Q188,98 184,102 Q148,102 114,100" fill="#00b7ff"/>
    <!-- Bottom-right -->
    <path d="M109,106 Q132,128 160,152 Q162,158 158,154 Q130,132 109,106" fill="#00b7ff"/>
    <!-- Bottom -->
    <path d="M100,112 Q100,145 96,182 Q98,188 100,182 Q104,145 100,112" fill="#00b7ff"/>
    <!-- Bottom-left -->
    <path d="M91,106 Q68,132 40,154 Q38,158 42,154 Q70,128 91,106" fill="#00b7ff"/>
    <!-- Left -->
    <path d="M86,100 Q52,102 16,102 Q12,98 16,96 Q52,98 86,100" fill="#00b7ff"/>
    <!-- Top-left -->
    <path d="M91,94 Q68,72 40,48 Q38,42 42,46 Q70,68 91,94" fill="#00b7ff"/>
  </g>

  <!-- Tentacle suckers -->
  <g fill="#005588" opacity="0.8">
    <circle cx="100" cy="52" r="3"/><circle cx="99" cy="35" r="2"/>
    <circle cx="128" cy="73" r="3"/><circle cx="143" cy="58" r="2"/>
    <circle cx="147" cy="100" r="3"/><circle cx="164" cy="99" r="2"/>
    <circle cx="129" cy="127" r="3"/><circle cx="144" cy="143" r="2"/>
    <circle cx="100" cy="147" r="3"/><circle cx="99" cy="164" r="2"/>
    <circle cx="71" cy="127" r="3"/><circle cx="56" cy="143" r="2"/>
    <circle cx="53" cy="100" r="3"/><circle cx="36" cy="100" r="2"/>
    <circle cx="72" cy="73" r="3"/><circle cx="58" cy="58" r="2"/>
  </g>

  <!-- Body mantle -->
  <ellipse cx="100" cy="100" rx="52" ry="46" fill="url(#bodyGrad)"
           stroke="#00b7ff" stroke-width="2" filter="url(#glow)"/>

  <!-- Bioluminescent veins -->
  <path d="M100,56 Q88,78 100,100 Q112,122 100,144"
        stroke="#8ce6ff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M66,74 Q80,88 100,100 Q120,112 134,126"
        stroke="#8ce6ff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M134,74 Q120,88 100,100 Q80,112 66,126"
        stroke="#8ce6ff" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Central eye -->
  <circle cx="100" cy="100" r="28" fill="#001a2e" stroke="#00b7ff" stroke-width="2"/>
  <circle cx="100" cy="100" r="20" fill="url(#eyeGrad)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="10" fill="#001122"/>
  <circle cx="100" cy="100" r="5"  fill="#00b7ff" filter="url(#glow)"/>
  <!-- Eye glint -->
  <circle cx="94" cy="94" r="3" fill="#ffffff" opacity="0.8"/>
</svg>
