<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Matrix Overload</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0d0d0f;
  color: #e0e0e0;
  font-family: 'Courier New', Courier, monospace;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ── HUD ───────────────────────────────────────────────── */
#hud {
  height: 54px;
  background: #0a0a10;
  border-bottom: 1px solid #1a1a2e;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 18px;
  flex-shrink: 0;
  flex-wrap: nowrap;
  overflow: hidden;
}

.hud-stage {
  font-size: 13px;
  color: #fff;
  font-weight: bold;
  white-space: nowrap;
  min-width: 74px;
}

.hud-boss-wrap {
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 140px;
}
.hud-bar-label { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 0.08em; }
.hud-bar-outer { height: 7px; background: #1a1a1a; border-radius: 3px; overflow: hidden; }
.hud-bar-inner { height: 100%; border-radius: 3px; transition: width 0.15s; }
#boss-bar-inner { background: linear-gradient(90deg, #aa1100, #ff4400); }

.hud-kills {
  font-size: 12px;
  color: #888;
  white-space: nowrap;
}

.hud-spacer { flex: 1; }

.hud-dps {
  font-size: 12px;
  color: #ffaa00;
  white-space: nowrap;
}

.hud-resources {
  font-size: 14px;
  color: #ffcc44;
  font-weight: bold;
  white-space: nowrap;
}

/* ── Canvas ────────────────────────────────────────────── */
#canvas-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0;
}

#game-canvas {
  display: block;
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  cursor: crosshair;
  touch-action: none;
}

/* ── Dock ──────────────────────────────────────────────── */
#dock {
  height: 138px;
  background: #0a0a10;
  border-top: 1px solid #1a1a2e;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

#dock-tabs {
  display: flex;
  border-bottom: 1px solid #1a1a2e;
  flex-shrink: 0;
}

.tab-btn {
  padding: 5px 14px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: #555;
  cursor: pointer;
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  transition: color 0.15s, border-color 0.15s;
}
.tab-btn:hover { color: #00ffcc; }
.tab-btn.active { color: #00ffcc; border-bottom-color: #00ffcc; }

#dock-content {
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 8px 12px;
}

/* ── Stats Panel ───────────────────────────────────────── */
#panel-stats {
  display: flex;
  gap: 22px;
  align-items: center;
  height: 100%;
  white-space: nowrap;
}
.stat-item { display: flex; flex-direction: column; gap: 1px; }
.stat-label { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 0.07em; }
.stat-value { font-size: 15px; color: #00ffcc; font-weight: bold; }

/* ── Upgrades Panel ────────────────────────────────────── */
#panel-upgrades {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  height: 100%;
  white-space: nowrap;
}

.upg-card {
  background: #12121e;
  border: 1px solid #242440;
  border-radius: 5px;
  padding: 6px 10px;
  min-width: 96px;
  max-width: 110px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
  flex-shrink: 0;
}
.upg-card:hover:not(.disabled):not(.on-cooldown) {
  border-color: #00ffcc;
  background: #18183a;
}
.upg-card.disabled { opacity: 0.38; cursor: not-allowed; }
.upg-card.is-active  { border-color: #ff9900; }
.upg-card.is-active:hover:not(.disabled):not(.on-cooldown) { border-color: #ffcc00; background: #1a1508; }
.upg-card.on-cooldown { opacity: 0.55; cursor: not-allowed; }

.upg-name   { font-size: 10px; color: #ccc; font-weight: bold; }
.upg-effect { font-size: 9px;  color: #555; margin: 2px 0 3px; line-height: 1.3; white-space: normal; }
.upg-level  { font-size: 9px;  color: #00ffcc; }
.upg-cost   { font-size: 10px; color: #ffaa00; margin-top: 2px; }

.cd-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: #ff9900;
  border-radius: 0 0 4px 4px;
  transition: width 0.1s linear;
}

/* ── Offline Panel ─────────────────────────────────────── */
#panel-offline {
  display: flex;
  flex-direction: column;
  gap: 5px;
  font-size: 11px;
  color: #666;
  height: 100%;
  justify-content: center;
}
.offline-row { display: flex; gap: 8px; align-items: center; }
.ol-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #00ff88; box-shadow: 0 0 6px #00ff88;
  flex-shrink: 0;
}

/* ── Offline Modal ─────────────────────────────────────── */
#offline-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.78);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
#offline-modal.show { display: flex; }
.modal-box {
  background: #0e0e18;
  border: 1px solid #00ffcc;
  border-radius: 8px;
  padding: 26px 34px;
  text-align: center;
  max-width: 340px;
}
.modal-title  { font-size: 17px; color: #00ffcc; margin-bottom: 10px; letter-spacing: 0.05em; }
.modal-body   { font-size: 13px; color: #888; margin-bottom: 6px; line-height: 1.7; }
.modal-earned { font-size: 26px; color: #ffcc44; font-weight: bold; margin: 8px 0 18px; }
.modal-btn {
  background: transparent;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  padding: 8px 26px;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.modal-btn:hover { background: #00ffcc22; }

::-webkit-scrollbar { height: 4px; width: 4px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

/* ── Auth Screen ─────────────────────────────────────── */
#auth-screen {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(4, 5, 12, 0.94);
  padding: 20px;
}
#auth-screen.hidden { display: none; }
.auth-card {
  width: min(420px, 100%);
  background: #0e0e18;
  border: 1px solid #00ffcc;
  border-radius: 10px;
  padding: 22px 22px 18px;
  box-shadow: 0 0 30px rgba(0,255,204,0.12);
}
.auth-title { font-size: 24px; color: #00ffcc; margin-bottom: 8px; letter-spacing: 0.06em; }
.auth-copy { color: #888; font-size: 12px; line-height: 1.7; margin-bottom: 12px; }
.auth-form { flex-direction: column; align-items: stretch; gap: 8px; }
.auth-form input { width: 100%; }
.auth-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.auth-hint { color: #666; font-size: 11px; margin-top: 8px; }

/* ── Account Panel ─────────────────────────────────────── */
#panel-account {
  display: flex;
  flex-direction: column;
  gap: 8px;
  height: 100%;
  justify-content: center;
  font-size: 12px;
}
.acct-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.acct-label { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 0.07em; }
.acct-value { color: #00ffcc; font-weight: bold; }
.acct-form { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; }
.acct-form input,
.acct-input,
.acct-textarea {
  background: #12121e;
  border: 1px solid #242440;
  border-radius: 4px;
  color: #e0e0e0;
  font-family: inherit;
  font-size: 12px;
  padding: 6px 8px;
}
.acct-form input { width: 150px; }
.acct-input { width: 180px; }
.acct-textarea {
  width: min(360px, 100%);
  min-height: 58px;
  resize: vertical;
}
.acct-form input:focus,
.acct-input:focus,
.acct-textarea:focus { outline: none; border-color: #00ffcc; }
.acct-btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
.acct-error { color: #ff6666; font-size: 11px; max-width: 220px; }
.acct-check-row { display: flex; gap: 8px; align-items: center; color: #ccc; }
.community-section { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.community-list { display: flex; flex-direction: column; gap: 6px; max-width: 420px; }
.profile-card {
  background: #12121e;
  border: 1px solid #242440;
  border-radius: 6px;
  padding: 8px 10px;
}
.profile-name { color: #00ffcc; font-weight: bold; }
.profile-meta { color: #888; font-size: 10px; margin-top: 2px; }
.profile-bio { color: #ccc; font-size: 11px; margin-top: 4px; }
.profile-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
.profile-tag {
  font-size: 9px;
  color: #ffcc44;
  background: #1f1f2e;
  border: 1px solid #33334a;
  border-radius: 999px;
  padding: 2px 6px;
}
.profile-empty { color: #666; font-size: 11px; }
.party-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
.party-pill {
  color: #ffcc44;
  border: 1px solid #3a2f00;
  background: #1a1408;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 10px;
}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-title">MATRIX OVERLOAD</div>
    <div class="auth-copy">Sign in to save your progress, build a profile, and join a party. You can also keep playing as a guest.</div>
    <div class="acct-form auth-form">
      <input type="email" id="auth-email" placeholder="email" autocomplete="email">
      <input type="password" id="auth-password" placeholder="password" autocomplete="current-password">
      <div class="auth-actions">
        <button class="modal-btn" id="auth-signin-btn">Log In</button>
        <button class="modal-btn" id="auth-signup-btn">Sign Up</button>
        <button class="modal-btn" id="auth-guest-btn">Play as Guest</button>
      </div>
    </div>
    <div class="acct-error" id="auth-error"></div>
    <div class="auth-hint">Profiles and party codes appear in the Account tab after you sign in.</div>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-stage">STAGE <span id="hud-stage-num">1</span></div>

  <div class="hud-boss-wrap" id="hud-boss-wrap" style="display:none">
    <div class="hud-bar-label">Boss HP</div>
    <div class="hud-bar-outer" style="width:140px">
      <div class="hud-bar-inner" id="boss-bar-inner" style="width:100%"></div>
    </div>
  </div>

  <div class="hud-kills" id="hud-kills">Kills: 0 / 12</div>

  <div class="hud-spacer"></div>
  <div class="hud-dps"       id="hud-dps">Auto: 0/s</div>
  <div class="hud-resources" id="hud-resources">⬡ 0</div>
</div>

<!-- Canvas -->
<div id="canvas-wrapper">
  <canvas id="game-canvas"></canvas>
</div>

<!-- Dock -->
<div id="dock">
  <div id="dock-tabs">
    <button class="tab-btn active" data-tab="stats">Stats</button>
    <button class="tab-btn"        data-tab="upgrades">Upgrades</button>
    <button class="tab-btn"        data-tab="offline">Cache</button>
    <button class="tab-btn"        data-tab="account">Account</button>
  </div>
  <div id="dock-content">
    <div id="panel-stats"></div>
    <div id="panel-upgrades" style="display:none"></div>
    <div id="panel-offline"  style="display:none"></div>
    <div id="panel-account"  style="display:none"></div>
  </div>
</div>

<!-- Offline Modal -->
<div id="offline-modal">
  <div class="modal-box">
    <div class="modal-title">WELCOME BACK</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-earned" id="modal-earned"></div>
    <button class="modal-btn" id="modal-close-btn">Collect</button>
  </div>
</div>

<script src="./firebase-config.local.js"></script>
<script type="module" src="./firebase-auth.js"></script>
<script type="module" src="./js/main.js"></script>
<!-- all game logic lives in js/ — entry point is js/main.js -->
</body>
</html>
